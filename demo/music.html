<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, user-scalable=yes">
    <title>8-Track Multi-Mixer v0.1</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #333;
            --accent-color: #00ffcc;
        }
        body {
            margin: 0;
            background-color: var(--bg-color);
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* 由容器處理捲動與縮放 */
            touch-action: none; 
        }
        #viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #app-container {
            width: 1000px;
            padding: 20px;
            background: #252525;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform-origin: center center;
        }
        h2 { text-align: center; color: var(--accent-color); margin-top: 0; }
        
        .mixer-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .track {
            background: var(--panel-color);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .fader {
            appearance: slider-vertical;
            width: 20px;
            height: 150px;
            margin: 10px 0;
        }
        .mute-btn {
            background: #555;
            border: none;
            color: white;
            padding: 5px;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
        }
        .mute-btn.active { background: #ff4444; }

        .recorder-section {
            background: #444;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        #rec-btn {
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 50px;
            border: none;
            background: #ff4444;
            color: white;
            cursor: pointer;
        }
        #rec-btn.recording { animation: pulse 1s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .status { margin-top: 10px; font-size: 0.9em; color: #aaa; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="app-container">
        <h2>8-TRACK MIXER ENGINE <small>v0.1</small></h2>
        
        <div class="mixer-grid" id="mixer">
            </div>

        <div class="recorder-section">
            <button id="rec-btn">開始錄音</button>
            <div class="status" id="status">點擊按鈕錄製一段聲音並自動循環</div>
            <div id="playback-area" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script>
    // --- 音軌初始化 ---
    const mixer = document.getElementById('mixer');
    const tracks = [];
    for (let i = 1; i <= 8; i++) {
        const div = document.createElement('div');
        div.className = 'track';
        div.innerHTML = `
            <span>CH ${i}</span>
            <input type="range" class="fader" min="0" max="1" step="0.01" value="0.7">
            <button class="mute-btn">MUTE</button>
        `;
        mixer.appendChild(div);
    }

    // --- 縮放與拖曳邏輯 (Gesture Handling) ---
    const container = document.getElementById('app-container');
    let scale = 1, lastScale = 1;
    let posX = 0, posY = 0, lastPosX = 0, lastPosY = 0;
    let isDragging = false;
    let startDist = 0;

    window.addEventListener('pointerdown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
        isDragging = true;
        lastPosX = e.clientX - posX;
        lastPosY = e.clientY - posY;
    });

    window.addEventListener('pointermove', e => {
        if (!isDragging) return;
        // 簡易模擬雙指縮放與單指拖曳
        if (e.pressure > 0 || e.pointerType === 'mouse') {
            posX = e.clientX - lastPosX;
            posY = e.clientY - lastPosY;
            updateTransform();
        }
    });

    window.addEventListener('pointerup', () => isDragging = false);

    // 滾輪縮放 (電腦端)
    window.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY * -0.001;
        scale = Math.min(Math.max(.5, scale + delta), 2);
        updateTransform();
    }, { passive: false });

    function updateTransform() {
        container.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    // --- 錄音功能 ---
    let mediaRecorder;
    let audioChunks = [];
    const recBtn = document.getElementById('rec-btn');
    const status = document.getElementById('status');

    recBtn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                addPlayback(audioUrl);
            };

            mediaRecorder.start();
            recBtn.textContent = '停止錄音';
            recBtn.classList.add('recording');
            status.textContent = '正在錄音...';
        } else {
            mediaRecorder.stop();
            recBtn.textContent = '開始錄音';
            recBtn.classList.remove('recording');
            status.textContent = '錄音完成！已加入循環播放。';
        }
    };

    function addPlayback(url) {
        const area = document.getElementById('playback-area');
        area.innerHTML = `
            <p>已錄製音源：</p>
            <audio src="${url}" controls loop autoplay></audio>
        `;
    }
</script>

</body>
</html>
